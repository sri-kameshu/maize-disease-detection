<!DOCTYPE html>
<html>
<head>
    <title>Maize Disease Detection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #d4fc79, #96e6a1);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            width: 400px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1b5e20;
        }

        img {
            margin-top: 15px;
            max-width: 100%;
            border-radius: 10px;
        }

        .result {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
        }

        .healthy {
            background-color: #c8e6c9;
        }

        .mild {
            background-color: #fff9c4;
        }

        .moderate {
            background-color: #ffe082;
        }

        .severe {
            background-color: #ef9a9a;
        }

        .loading {
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>🌽 Maize Disease Detection</h2>

    <input type="file" id="imageInput" accept="image/*"><br>
    <button onclick="predict()">Predict</button>

    <div id="loading" class="loading"></div>
    <div id="preview"></div>
    <div id="result"></div>
</div>

<script>
async function predict() {

    const fileInput = document.getElementById("imageInput");
    const file = fileInput.files[0];

    if (!file) {
        alert("Please select an image");
        return;
    }

    document.getElementById("loading").innerText = "Analyzing image...";
    document.getElementById("result").innerHTML = "";

    const preview = document.getElementById("preview");
    preview.innerHTML = `<img src="${URL.createObjectURL(file)}">`;

    const formData = new FormData();
    formData.append("file", file);

    const response = await fetch("https://your-backend-url.onrender.com/predict", {
        method: "POST",
        body: formData
    });

    const data = await response.json();

    document.getElementById("loading").innerText = "";

    let severityClass = "healthy";

    if (data.severity_level === "Mild") severityClass = "mild";
    if (data.severity_level === "Moderate") severityClass = "moderate";
    if (data.severity_level === "Severe") severityClass = "severe";

    document.getElementById("result").innerHTML =
        `<div class="result ${severityClass}">
            <strong>Disease:</strong> ${data.disease}<br>
            <strong>Severity:</strong> ${data.severity_percent}%<br>
            <strong>Level:</strong> ${data.severity_level}
        </div>`;
}
</script>

</body>
</html>
